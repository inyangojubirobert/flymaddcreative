<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Merchant Login - One Dream Initiative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-8 py-6 text-center">
            <h1 class="text-2xl font-bold text-white">Merchant Login</h1>
            <p class="text-indigo-100 mt-1">Access your referral dashboard</p>
            <div class="inline-block bg-white/20 backdrop-blur-sm px-6 py-2 rounded-full mt-4 font-bold text-white border border-white/30">
                💰 Track Your Earnings
            </div>
        </div>

        <!-- Benefits Badge -->
        <div class="bg-yellow-50 px-8 py-3 border-b border-yellow-100">
            <p class="text-yellow-800 text-sm flex items-center justify-center">
                <span class="font-bold text-lg mr-2">⚡</span>
                <span><span class="font-bold">50 tokens</span> per confirmed vote from your referrals</span>
            </p>
        </div>

        <!-- Form -->
        <div class="p-8">
            <!-- Error Message Container -->
            <div id="errorContainer" class="bg-red-50 border-l-4 border-red-500 p-4 rounded mb-5 hidden">
                <p id="errorMessage" class="text-red-700 text-sm"></p>
            </div>

            <!-- Success Message Container -->
            <div id="successContainer" class="bg-green-50 border-l-4 border-green-500 p-4 rounded mb-5 hidden">
                <p id="successMessage" class="text-green-700 text-sm"></p>
            </div>

            <form id="loginForm" class="space-y-6">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
                        placeholder="merchant@example.com"
                        required
                    />
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <div class="relative">
                        <input
                            id="password"
                            name="password"
                            type="password"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition pr-12"
                            placeholder="••••••••"
                            required
                        />
                        <button
                            type="button"
                            onclick="togglePassword('password', 'eyeIcon')"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                        >
                            <span id="eyeIcon">👁️</span>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input
                            id="remember"
                            type="checkbox"
                            class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded"
                        />
                        <label for="remember" class="ml-2 block text-sm text-gray-700">
                            Remember me
                        </label>
                    </div>
                    <a href="/merchants/forgot-password.html" class="text-sm text-indigo-600 hover:text-indigo-500">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    id="loginBtn"
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 px-4 rounded-lg font-medium hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Login to Dashboard
                </button>

                <!-- Demo Credentials (for testing) -->
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                    <p class="text-xs text-blue-800 font-semibold mb-2">🔐 Demo Credentials:</p>
                    <p class="text-xs text-blue-600">Email: demo@merchant.com</p>
                    <p class="text-xs text-blue-600">Password: demo1234</p>
                </div>

                <!-- Register Link -->
                <div class="text-center mt-6">
                    <p class="text-sm text-gray-600">
                        Don't have a merchant account?{' '}
                        <a href="merchant-register.html" class="text-indigo-600 hover:text-indigo-500 font-medium">
                            Register here
                        </a>
                    </p>
                </div>

                <!-- Return to Main Site -->
                <div class="border-t pt-4 mt-4">
                    <a href="/" class="text-sm text-gray-500 hover:text-gray-700 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                        </svg>
                        Back to Main Site
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '👁️‍🗨️';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // Helper functions for message display
        function showError(message) {
            const container = document.getElementById('errorContainer');
            const messageEl = document.getElementById('errorMessage');
            container.classList.remove('hidden');
            messageEl.textContent = message;
            
            // Hide success if showing
            document.getElementById('successContainer').classList.add('hidden');
            
            // Scroll to error
            container.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            const container = document.getElementById('successContainer');
            const messageEl = document.getElementById('successMessage');
            container.classList.remove('hidden');
            messageEl.textContent = message;
            
            // Hide error if showing
            document.getElementById('errorContainer').classList.add('hidden');
        }

        function hideMessages() {
            document.getElementById('errorContainer').classList.add('hidden');
            document.getElementById('successContainer').classList.add('hidden');
        }

        // Email validation
        document.getElementById('email').addEventListener('input', function() {
            const email = this.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (email && !emailRegex.test(email)) {
                this.classList.add('border-red-500');
                showError('Please enter a valid email address');
            } else {
                this.classList.remove('border-red-500');
                hideMessages();
            }
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get values
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Validation
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                document.getElementById('email').focus();
                return;
            }
            
            // Disable button
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = `
                <span class="flex items-center justify-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Logging in...
                </span>
            `;
            
            try {
                // Attempt real login via API
                const LOGIN_URL = '/api/merchants/login';
                const response = await fetch(LOGIN_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    const merchant = data.merchant || {};

                    // Persist merchant session
                    if (data.token) localStorage.setItem('merchantToken', data.token);
                    if (merchant.id) localStorage.setItem('merchantId', merchant.id);
                    localStorage.setItem('merchantName', merchant.merchant_name || merchant.email || '');
                    localStorage.setItem('merchantEmail', merchant.email || email);

                    showSuccess('Login successful! Redirecting to dashboard...');
                    setTimeout(() => {
                        window.location.href = '/merchant-dashboard.html';
                    }, 800);
                } else {
                    const msg = data.message || data.error || 'Invalid email or password';
                    showError(msg);
                    btn.disabled = false;
                    btn.innerHTML = 'Login to Dashboard';
                }

            } catch (error) {
                showError('Login failed. Please try again.');
                btn.disabled = false;
                btn.innerHTML = 'Login to Dashboard';
            }
        });

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('merchantToken');
            if (token) {
                // Auto-redirect to dashboard if already logged in
                window.location.href = '/merchants/dashboard.html';
            }
        });
    </script>
</body>
</html>
